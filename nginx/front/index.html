<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>DevOps - Docker Compose</title>
    
    <style>
    body{
      font-family:Arial, Helvetica, sans-serif;
      background-color: slateblue;
    }
  main{
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  td{
    padding: 10px;
    background-color: #fff5;
  }
  tr:nth-child(2n){
    background-color: rgb(140, 39, 255);
  }
  th{
    padding: 10px
  }
  .heading{
    background-color: black;
    color: aliceblue;
    text-align: center;
  }
  table{
    border-color: black;
    border-width: 5px
  }
  thead:first-child{
    border-top-left-radius: 15px;
  }

  </style>
  </head>
  <body>
    <main>
      <h1>Container Frontend</h1>
      <p>Este container recebe requisições do serviço de <strong>Backend</strong>,<br>que
        coleta informações da tabela <strong>usuarios</strong> do serviço <strong>db</strong></p>
      <table border="1" id="table1">
        <thead class="heading">
          <th>Nome de usuario</th>
          <th>Email</th>
          <th>Senha</th>
        </thead>
      </table>
    </main>
    <script src="script.js"></script>
  </body>
</html>
